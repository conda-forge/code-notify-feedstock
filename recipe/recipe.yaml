context:
  version: "1.6.3"

package:
  name: code-notify
  version: ${{ version }}

source:
  url: https://github.com/mylee04/code-notify/archive/v${{ version }}.tar.gz
  sha256: f1107cff23ce0064d843bb2c175826c9afeab61f7112d252a67a958b2826dac5

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/bin $PREFIX/lib/code-notify
    - cp bin/code-notify $PREFIX/bin/code-notify
    - chmod +x $PREFIX/bin/code-notify
    - ln -s code-notify $PREFIX/bin/cn
    - ln -s code-notify $PREFIX/bin/cnp
    - cp -r lib/code-notify/* $PREFIX/lib/code-notify/

requirements:
  run:
    - __unix

tests:
  - script:
      - code-notify version
      - cn version

about:
  homepage: https://github.com/mylee04/code-notify
  summary: Cross-platform desktop notifications for AI coding tools
  description: |
    Code-Notify provides desktop notifications for AI coding tools.
    Get alerts when tasks complete or input is needed. Supports
    Claude Code, OpenAI Codex, and Google Gemini CLI.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/mylee04/code-notify

extra:
  recipe-maintainers:
    - pavelzw
